services:
  postgres:
    image: postgres:16
    container_name: deplao_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: deplao_web
      POSTGRES_USER: deplao
      POSTGRES_PASSWORD: deplao_local
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deplao -d deplao_web"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: deplao_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
    driver: local
